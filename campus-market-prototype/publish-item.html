<!DOCTYPE html>
<!--
  ============================================
  Migration Comment: 发布二手表单页 (页面6 - 二手)
  对应设计稿: 发布二手交易信息
  需迁移为 Vue/Element Plus 组件
  字段: title, campus, location, description, price, condition, tags, images
  ============================================
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园轻集市 - 发布二手</title>
  <!-- Element Plus -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --main: #FFE8D6;
      --secondary: #FFF9F3;
      --text-primary: #333;
      --text-secondary: #666;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .page-container {
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
    }
    .top-bar {
      background: var(--main);
      padding: 16px 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 18px;
      font-weight: 600;
    }
    .top-bar .back-btn {
      font-size: 22px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      line-height: 1;
    }
    .content-area {
      padding: 40px 80px;
    }
    .form-card {
      background: #fff;
      border: 2px solid var(--main);
      border-radius: 20px;
      padding: 48px 56px;
      max-width: 800px;
      margin: 0 auto;
    }
    .form-card .el-form-item {
      margin-bottom: 24px;
    }
    .form-card .required-star {
      color: #f56c6c;
      margin-left: 2px;
    }
    .btn-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }
    .btn-submit {
      background: linear-gradient(135deg, #FFE8D6, #f5d0b0);
      border: none;
      color: var(--text-primary);
      font-weight: 600;
      padding: 12px 48px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-reset {
      background: #e0e0e0;
      border: none;
      color: var(--text-secondary);
      font-weight: 500;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-reset:hover { background: #d0d0d0; }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: var(--main); }
    .upload-area .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .preview-list {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .preview-item {
      width: 80px; height: 80px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 1px solid #eee;
    }
    @media (max-width: 768px) {
      .top-bar { padding: 16px; }
      .content-area { padding: 24px 16px; }
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-container">
      <!-- Top Bar -->
      <div class="top-bar">
        <a href="publish.html" class="back-btn">&lt;</a>
        <span>发布二手交易</span>
      </div>

      <!-- Content -->
      <div class="content-area">
        <div class="form-card">
          <el-form label-position="top" :model="form">

            <!-- 标题 -->
            <el-form-item label="标题">
              <template #label>
                <span>标题<span class="required-star">*</span></span>
              </template>
              <el-input v-model="form.title" placeholder="请输入商品标题" />
              <!-- 静态校验错误演示 -->
              <div style="color:#f56c6c;font-size:12px;margin-top:4px;">请输入商品标题</div>
            </el-form-item>

            <!-- 所属校区 -->
            <el-form-item label="所属校区">
              <el-select v-model="form.campus" placeholder="请选择校区" style="width:100%;">
                <el-option label="校本部" value="main" />
                <el-option label="东校区" value="east" />
                <el-option label="西校区" value="west" />
                <el-option label="南校区" value="south" />
              </el-select>
            </el-form-item>

            <!-- 交易地点 -->
            <el-form-item label="交易地点">
              <el-input v-model="form.location" placeholder="如：图书馆一楼大厅" />
            </el-form-item>

            <!-- 商品描述 -->
            <el-form-item label="商品描述">
              <el-input v-model="form.description" type="textarea" :rows="4" placeholder="请详细描述商品信息、使用情况等" />
            </el-form-item>

            <!-- 价格 -->
            <el-form-item label="价格（元）">
              <el-input-number v-model="form.price" :min="0" :precision="2" style="width:200px;" />
            </el-form-item>

            <!-- 成色评分 -->
            <el-form-item label="成色评分（1-10）">
              <el-input-number v-model="form.condition" :min="1" :max="10" style="width:200px;" />
              <div style="color:var(--text-secondary);font-size:12px;margin-top:4px;">1 = 较差, 10 = 全新</div>
            </el-form-item>

            <!-- 标签 -->
            <el-form-item label="标签">
              <el-input v-model="form.tags" placeholder="如：教材, 九成新, 可议价（用逗号分隔）" />
            </el-form-item>

            <!-- 图片上传 -->
            <el-form-item label="上传图片">
              <div class="upload-area">
                <div class="upload-icon">📷</div>
                <div>点击或拖拽上传图片</div>
                <div style="font-size:12px;margin-top:4px;">支持 JPG/PNG，最多 6 张</div>
              </div>
              <div class="preview-list">
                <div class="preview-item">📱</div>
                <div class="preview-item">📦</div>
              </div>
            </el-form-item>

          </el-form>

          <!-- Buttons -->
          <div class="btn-group">
            <button class="btn-submit">提交发布</button>
            <button class="btn-reset">重置</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    const app = createApp({
      setup() {
        const form = ref({
          title: '',
          campus: '',
          location: '',
          description: '',
          price: 0,
          condition: 5,
          tags: ''
        });
        return { form };
      }
    });
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
