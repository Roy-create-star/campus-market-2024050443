<!DOCTYPE html>
<!--
  =====================================================
  页面名称: 我的发布 (子页面)
  对应设计稿: 校园轻集市 - 我的发布
  主要功能: 按状态筛选发布列表、更新商品状态
  迁移说明:
    - 筛选 tabs 使用 el-radio-group 模拟，替换为 el-tabs 亦可
    - el-dropdown 用于状态变更操作
    - 数据集中在 data.posts，迁移时对接 API
    - 图片占位 div 替换为真实 <img>
  =====================================================
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的发布 - 校园轻集市</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.9.1/theme-chalk/index.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --main: #FFE8D6;
      --secondary: #FFF9F3;
      --text-primary: #333;
      --text-secondary: #666;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      color: var(--text-primary);
      background: #f5f5f5;
      margin: 0;
    }
    .container-main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .bg-main { background-color: var(--main); }
    .text-secondary { color: var(--text-secondary); }
    .post-card {
      display: flex;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 0.2s;
    }
    .post-card:hover { transform: translateY(-2px); }
    .post-img {
      width: 160px;
      min-height: 130px;
      flex-shrink: 0;
      background: #e0e0e0;
    }
    .filter-tab {
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      background: #fff;
      color: var(--text-secondary);
    }
    .filter-tab.active {
      background: var(--main);
      color: var(--text-primary);
      font-weight: 600;
    }
    .filter-tab:hover:not(.active) { background: #f5f5f5; }
    .el-dropdown-link { cursor: pointer; }
    .el-popper { border-radius: 10px; }
  </style>
</head>
<body>

<div id="app">
  <div class="container-main" style="padding-top: 30px; padding-bottom: 60px;">
    <!-- 顶部导航 -->
    <div class="flex items-center gap-3 mb-6">
      <span style="font-size:22px; cursor:pointer;" @click="goBack">←</span>
      <h1 class="text-xl font-bold">我的发布</h1>
    </div>

    <!-- 筛选 tabs -->
    <div class="flex flex-wrap gap-2 mb-6">
      <div
        class="filter-tab"
        :class="{ active: filter === 'all' }"
        @click="filter = 'all'"
      >全部</div>
      <div
        class="filter-tab"
        :class="{ active: filter === 'ongoing' }"
        @click="filter = 'ongoing'"
      >进行中</div>
      <div
        class="filter-tab"
        :class="{ active: filter === 'completed' }"
        @click="filter = 'completed'"
      >已完成</div>
      <div
        class="filter-tab"
        :class="{ active: filter === 'closed' }"
        @click="filter = 'closed'"
      >已关闭</div>
    </div>

    <!-- 发布列表 -->
    <div v-if="filteredPosts.length" class="flex flex-col gap-4">
      <div class="post-card" v-for="(item, idx) in filteredPosts" :key="idx">
        <div class="post-img"></div>
        <div class="flex-1 p-4 flex flex-col justify-between">
          <div>
            <div class="font-semibold text-base mb-1">{{ item.title }}</div>
            <div class="flex items-center gap-3 text-sm mb-2 flex-wrap">
              <span style="font-weight:600; color:#333;">¥{{ item.price }}</span>
              <span class="text-secondary">· {{ item.date }}</span>
              <el-tag
                size="small"
                :type="statusTagType(item.status)"
                effect="plain"
                style="border-radius:20px;"
              >
                {{ statusLabel(item.status) }}
              </el-tag>
            </div>
          </div>
          <div class="flex justify-end">
            <!-- 状态更新 dropdown -->
            <el-dropdown trigger="click" @command="(val) => changeStatus(item, val)">
              <el-button
                size="small"
                style="background:#FFE8D6; border-color:#FFE8D6; color:#333; border-radius:20px;"
              >
                更新状态 <el-icon style="margin-left:4px;"><arrow-down /></el-icon>
              </el-button>
              <template #dropdown>
                <el-dropdown-menu>
                  <el-dropdown-item command="ongoing">进行中</el-dropdown-item>
                  <el-dropdown-item command="completed">已完成</el-dropdown-item>
                  <el-dropdown-item command="closed">已关闭</el-dropdown-item>
                </el-dropdown-menu>
              </template>
            </el-dropdown>
          </div>
        </div>
      </div>
    </div>

    <el-empty v-else description="暂无发布" :image-size="80" style="margin-top:60px;" />
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.9.1/index.full.min.js"></script>
<script>
const { createApp, ref, reactive, computed } = Vue;

const app = createApp({
  setup() {
    // ===== 筛选状态 =====
    const filter = ref('all');

    // ===== 发布数据（迁移时替换为 API 数据） =====
    const posts = reactive([
      { title: '二手高数课本第六版', price: 25, date: '2026-06-20', status: 'ongoing' },
      { title: '全新计算器 fx-991CNX', price: 120, date: '2026-06-18', status: 'ongoing' },
      { title: '宿舍用小冰箱 便携', price: 80, date: '2026-06-15', status: 'completed' },
      { title: '大学物理笔记 手写', price: 15, date: '2026-06-10', status: 'closed' },
      { title: '篮球 斯伯丁正品', price: 55, date: '2026-06-08', status: 'ongoing' },
      { title: '毛概课本 九成新', price: 20, date: '2026-06-05', status: 'completed' },
      { title: '漫步者耳机', price: 90, date: '2026-06-02', status: 'closed' },
    ]);

    // ===== 筛选计算属性 =====
    const filteredPosts = computed(() => {
      if (filter.value === 'all') return posts;
      return posts.filter(p => p.status === filter.value);
    });

    // ===== 变更状态 =====
    function changeStatus(item, newStatus) {
      item.status = newStatus;
      ElMessage.success('状态已更新为：' + statusLabel(newStatus));
    }

    // ===== 辅助 =====
    function statusTagType(status) {
      const map = { ongoing: 'warning', completed: 'success', closed: 'info' };
      return map[status] || 'info';
    }

    function statusLabel(status) {
      const map = { ongoing: '进行中', completed: '已完成', closed: '已关闭' };
      return map[status] || status;
    }

    // ===== 导航 =====
    function goBack() {
      window.location.href = 'profile.html';
    }

    return {
      filter, posts, filteredPosts,
      changeStatus, statusTagType, statusLabel,
      goBack,
    };
  },
});

app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
