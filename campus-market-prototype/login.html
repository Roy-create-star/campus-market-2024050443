<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 校园轻集市</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 【此处迁移至 Vue3 组件】 -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background: #FFF9F3; color: #333; height: 100vh; }
    #app, .login-wrapper { height: 100vh; }
    .login-wrapper { display: flex; align-items: center; justify-content: center; }
    .login-container { display: flex; background: #fff; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); overflow: hidden; max-width: 960px; width: 100%; }
    .login-left { flex: 1; padding: 48px 40px; max-width: 420px; margin: 0 auto; }
    .login-right { width: 420px; min-height: 520px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FFE8D6 0%, #FFD9B3 100%); }
    @media (max-width: 768px) { .login-right { display: none; } .login-left { max-width: 100%; padding: 32px 24px; } }
    .brand { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .brand-sub { font-size: 14px; color: #999; margin-bottom: 32px; }
    .login-btn { width: 100%; background: #FFE8D6 !important; border-color: #FFE8D6 !important; color: #333 !important; font-weight: 600; }
    .login-btn:hover { background: #FFD9B3 !important; border-color: #FFD9B3 !important; }
    .form-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    .form-footer a { color: #333; text-decoration: none; font-weight: 600; }
    .form-footer a:hover { color: #FFD9B3; }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-wrapper">
      <div class="login-container">
        <!-- 左侧表单 -->
        <div class="login-left">
          <div class="brand">🏫 校园轻集市</div>
          <div class="brand-sub">登录你的校园集市账号</div>

          <el-form ref="loginFormRef" :model="form" label-position="top" size="large">
            <el-form-item label="用户名" prop="username" :rules="[{ required: true, message: '请输入用户名', trigger: 'blur' }]">
              <el-input v-model="form.username" placeholder="请输入用户名或学号" prefix-icon="User" />
            </el-form-item>

            <el-form-item label="密码" prop="password" :rules="[{ required: true, message: '请输入密码', trigger: 'blur' }]">
              <el-input v-model="form.password" type="password" placeholder="请输入密码" prefix-icon="Lock" show-password />
            </el-form-item>

            <el-form-item>
              <div style="display:flex;justify-content:space-between;width:100%;">
                <el-checkbox v-model="form.remember">记住我</el-checkbox>
                <a href="#" style="font-size:13px;color:#666;text-decoration:none;">忘记密码？</a>
              </div>
            </el-form-item>

            <el-form-item>
              <el-button type="primary" class="login-btn" @click="handleLogin" :loading="loading">登 录</el-button>
            </el-form-item>
          </el-form>

          <div class="form-footer">
            还没有账号？ <a href="register.html">立即注册 →</a>
          </div>

          <div style="margin-top:24px;padding-top:20px;border-top:1px solid #f5f5f5;">
            <p style="font-size:12px;color:#999;text-align:center;margin-bottom:10px;">其他方式登录</p>
            <div style="display:flex;justify-content:center;gap:16px;">
              <span style="display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border:1px solid #f0f0f0;border-radius:8px;font-size:13px;color:#666;cursor:pointer;">📱 学号认证</span>
              <span style="display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border:1px solid #f0f0f0;border-radius:8px;font-size:13px;color:#666;cursor:pointer;">📧 邮箱登录</span>
            </div>
          </div>
          <!-- 【此处写入 pinia 仓库】 【此处封装 api.ts】 -->
        </div>

        <!-- 右侧插画占位 -->
        <div class="login-right">
          <div style="text-align:center;padding:32px;">
            <div style="width:200px;height:200px;background:rgba(255,255,255,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:80px;">🏛️</div>
            <h3 style="font-size:18px;color:#333;margin-bottom:8px;">欢迎回到校园集市</h3>
            <p style="font-size:14px;color:#666;line-height:1.6;">
              在这里，你可以<br>
              买卖闲置 · 寻找失物 · 组队拼单 · 委托跑腿
            </p>
          </div>
        </div>
      </div>
    </div>
    <!-- 【此处迁移至 Vue3 组件】 -->
  </div>

  <script>
    const { createApp, ref, reactive } = Vue;
    const app = createApp({
      setup() {
        const form = reactive({
          username: '',
          password: '',
          remember: false
        });
        const loading = ref(false);
        const loginFormRef = ref(null);

        const handleLogin = () => {
          if (!loginFormRef.value) return;
          loginFormRef.value.validate((valid) => {
            if (valid) {
              loading.value = true;
              setTimeout(() => {
                loading.value = false;
                ElementPlus.ElMessage.success('登录成功（静态演示）');
              }, 1200);
            }
          });
        };

        return { form, loading, loginFormRef, handleLogin };
      }
    });
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
