<!DOCTYPE html>
<!--
  ============================================
  Migration Comment: 信息统一发布选择页 (页面6 base)
  对应设计稿: 信息发布选择页
  需迁移为 Vue/Element Plus 组件
  ============================================
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园轻集市 - 发布信息</title>
  <!-- Element Plus -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --main: #FFE8D6;
      --secondary: #FFF9F3;
      --text-primary: #333;
      --text-secondary: #666;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .page-container {
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
    }
    .top-bar {
      background: var(--main);
      padding: 20px 0;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 1px;
    }
    .content-area {
      padding: 48px 80px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
    }
    .publish-card {
      background: #fff;
      border: 2px solid var(--main);
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .publish-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    .publish-card .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }
    .publish-card h3 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .publish-card p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }
    @media (max-width: 768px) {
      .content-area { padding: 24px 16px; }
      .card-grid { grid-template-columns: 1fr; gap: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-container">
      <!-- Top Bar -->
      <div class="top-bar">
        发布信息
      </div>

      <!-- Content -->
      <div class="content-area">
        <div class="card-grid">
          <!-- 二手交易 -->
          <a class="publish-card" href="publish-item.html">
            <div class="icon">🔄</div>
            <h3>二手交易</h3>
            <p>出售闲置教材、电子产品、生活用品等<br/>给你的旧物找个新主人</p>
          </a>

          <!-- 失物招领 -->
          <a class="publish-card" href="publish-lost.html">
            <div class="icon">🔍</div>
            <h3>失物招领</h3>
            <p>发布拾获物品或寻找丢失物品<br/>互帮互助，温暖校园</p>
          </a>

          <!-- 拼单搭子 -->
          <a class="publish-card" href="publish-group.html">
            <div class="icon">👫</div>
            <h3>拼单搭子</h3>
            <p>外卖拼单、团购凑单、课程合买<br/>一起省钱的好搭档</p>
          </a>

          <!-- 跑腿委托 -->
          <a class="publish-card" href="publish-task.html">
            <div class="icon">🏃</div>
            <h3>跑腿委托</h3>
            <p>代取快递、代买午餐、资料代送<br/>高效互助，省时省力</p>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    const app = createApp({});
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
