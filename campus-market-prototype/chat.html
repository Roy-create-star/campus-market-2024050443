<!DOCTYPE html>
<!--
 * ============================================================
 * 校园轻集市 - 聊天详情页面 (页面7 - with messages)
 * File: chat.html
 * Migration note: Static HTML prototype using Vue 3 + Element Plus + Tailwind CSS.
 * Vue data (conversations, messages, activeConversation) should be replaced with API calls.
 * Messages are simulated for a price negotiation flow.
 * Color scheme: primary #FFE8D6 (my messages, send button), secondary #FFF9F3.
 * Layout: dual column (left 380px conversation list + right flexible chat area).
 * Full height calc(100vh - 64px) for fixed navbar.
 * Item info mini card at top right: thumbnail + title + price.
 * Message input with el-input + #FFE8D6 send button.
 * Price offer messages with special styling.
 * Scrollable message area using overflow-y.
 * ============================================================
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天详情 - 校园轻集市</title>
  <!-- CDN Dependencies -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.6.1/theme-chalk/index.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.6.1/index.full.min.js"></script>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #FFF9F3; color: #333; }
    /* Navbar */
    .navbar { height: 64px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 40px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
    .navbar .logo { font-size: 20px; font-weight: 700; color: #333; }
    .navbar .logo span { color: #FFE8D6; }
    .navbar .nav-tabs { margin-left: 48px; display: flex; gap: 32px; }
    .navbar .nav-tabs a { text-decoration: none; color: #666; font-size: 15px; }
    .navbar .nav-tabs a.active { color: #333; font-weight: 600; position: relative; }
    .navbar .nav-tabs a.active::after { content: ''; position: absolute; bottom: -20px; left: 0; right: 0; height: 3px; background: #FFE8D6; border-radius: 2px; }
    /* Layout */
    .app-container { margin-top: 64px; height: calc(100vh - 64px); display: flex; background: #fff; }
    .left-panel { width: 380px; min-width: 380px; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; background: #fff; }
    .right-panel { flex: 1; display: flex; flex-direction: column; background: #FFF9F3; min-width: 0; }
    /* Left panel header */
    .panel-header { padding: 20px 24px 16px; border-bottom: 1px solid #f5f5f5; }
    .panel-header h2 { font-size: 18px; font-weight: 600; color: #333; }
    .panel-header .subtitle { font-size: 13px; color: #999; margin-top: 4px; }
    .search-box { padding: 12px 24px; }
    .search-box .el-input__wrapper { background: #f5f5f5; border-radius: 20px; box-shadow: none !important; }
    /* Conversation list */
    .conversation-list { flex: 1; overflow-y: auto; }
    .conversation-list::-webkit-scrollbar { width: 4px; }
    .conversation-list::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }
    .conversation-item { display: flex; align-items: center; padding: 16px 24px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #f8f8f8; }
    .conversation-item:hover { background: #fafafa; }
    .conversation-item.active { background: #FFE8D6; }
    .conversation-item .avatar-wrap { position: relative; margin-right: 14px; flex-shrink: 0; }
    .conversation-item .avatar-wrap .el-avatar { border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .conversation-item .item-preview { width: 48px; height: 48px; border-radius: 8px; background: #f0f0f0; flex-shrink: 0; margin-right: 14px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #bbb; }
    .conversation-item .info { flex: 1; min-width: 0; }
    .conversation-item .info .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .conversation-item .info .top .name { font-size: 15px; font-weight: 500; color: #333; }
    .conversation-item .info .top .time { font-size: 12px; color: #999; }
    .conversation-item .info .last-msg { font-size: 13px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conversation-item .info .last-msg .price-highlight { color: #E74C3C; font-weight: 500; }
    /* Item info mini card */
    .item-info-card { display: flex; align-items: center; padding: 14px 24px; background: #fff; border-bottom: 1px solid #f0f0f0; gap: 14px; flex-shrink: 0; }
    .item-info-card .item-thumb { width: 56px; height: 56px; border-radius: 8px; background: #f5f5f5; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #bbb; }
    .item-info-card .item-detail { flex: 1; min-width: 0; }
    .item-info-card .item-detail .title { font-size: 15px; font-weight: 500; color: #333; }
    .item-info-card .item-detail .price { font-size: 16px; font-weight: 600; color: #E74C3C; margin-top: 2px; }
    .item-info-card .item-detail .status { font-size: 12px; color: #999; margin-top: 2px; }
    .item-info-card .action-btn { flex-shrink: 0; }
    /* Chat messages area */
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }
    /* Message bubble */
    .msg-row { display: flex; align-items: flex-start; gap: 10px; max-width: 70%; }
    .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.their { align-self: flex-start; }
    .msg-row .msg-avatar { flex-shrink: 0; margin-top: 4px; }
    .msg-row .bubble { padding: 10px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; position: relative; }
    .msg-row.my .bubble { background: #FFE8D6; color: #333; border-bottom-right-radius: 4px; }
    .msg-row.their .bubble { background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
    /* Price offer message */
    .msg-row .bubble.price-offer { background: #fff !important; border: 1.5px solid #FFE8D6; padding: 12px 16px; }
    .msg-row .bubble.price-offer .offer-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .msg-row .bubble.price-offer .offer-amount { font-size: 20px; font-weight: 700; color: #E74C3C; margin-bottom: 6px; }
    .msg-row .bubble.price-offer .offer-actions { display: flex; gap: 8px; margin-top: 8px; }
    .msg-row .bubble .msg-time { font-size: 11px; color: #999; margin-top: 4px; display: block; }
    .msg-row.my .bubble .msg-time { text-align: right; }
    /* Chat divider (date) */
    .chat-divider { text-align: center; font-size: 12px; color: #bbb; padding: 8px 0; position: relative; }
    .chat-divider::before, .chat-divider::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: #eee; }
    .chat-divider::before { left: 0; }
    .chat-divider::after { right: 0; }
    /* Message input */
    .chat-input { padding: 14px 24px; background: #fff; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-input .el-input__wrapper { border-radius: 20px; background: #f5f5f5; box-shadow: none !important; }
    .chat-input .send-btn { background: #FFE8D6; border: none; color: #333; border-radius: 20px; padding: 8px 22px; font-size: 14px; cursor: pointer; transition: background 0.2s; white-space: nowrap; font-weight: 500; }
    .chat-input .send-btn:hover { background: #f5d5b8; }
    /* Responsive / back button placeholder */
    .back-btn { display: none; }
    @media (max-width: 768px) { .left-panel { display: none; } .back-btn { display: inline-flex; } }
  </style>
</head>
<body>
  <div id="app">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo"><span>校园</span>轻集市</div>
      <div class="nav-tabs">
        <a href="#">首页</a>
        <a href="#">集市</a>
        <a href="#" class="active">消息</a>
        <a href="#">我的</a>
      </div>
    </nav>

    <!-- Main app container -->
    <div class="app-container">
      <!-- Left: Conversation list -->
      <div class="left-panel">
        <div class="panel-header">
          <h2>消息中心</h2>
          <div class="subtitle">共 {{ conversations.length }} 个会话</div>
        </div>
        <div class="search-box">
          <el-input v-model="searchQuery" placeholder="搜索消息或用户" :prefix-icon="Search" clearable size="default" />
        </div>
        <div class="conversation-list">
          <div
            v-for="conv in filteredConversations"
            :key="conv.id"
            class="conversation-item"
            :class="{ active: activeConversation && activeConversation.id === conv.id }"
            @click="selectConversation(conv)"
          >
            <div class="avatar-wrap">
              <el-avatar :size="48" :src="conv.avatar">{{ conv.name.charAt(0) }}</el-avatar>
            </div>
            <div class="item-preview">
              {{ conv.itemName }}
            </div>
            <div class="info">
              <div class="top">
                <span class="name">{{ conv.name }}</span>
                <span class="time">{{ conv.lastTime }}</span>
              </div>
              <div class="last-msg">
                <span v-if="conv.lastMsgType === 'price'" class="price-highlight">{{ conv.lastMsg }}</span>
                <span v-else>{{ conv.lastMsg }}</span>
              </div>
            </div>
            <div style="margin-left:8px;" v-if="conv.unread > 0">
              <el-badge :value="conv.unread" :max="99" />
            </div>
          </div>
          <div v-if="filteredConversations.length === 0" style="text-align:center;padding:48px 24px;color:#bbb;">
            <p>暂无会话</p>
          </div>
        </div>
      </div>

      <!-- Right panel: Chat detail -->
      <div class="right-panel">
        <!-- No conversation selected -->
        <template v-if="!activeConversation">
          <div style="flex:1;display:flex;align-items:center;justify-content:center;">
            <div style="text-align:center;color:#bbb;">
              <el-icon :size="64"><ChatDotRound /></el-icon>
              <h3 style="font-size:16px;font-weight:500;color:#999;margin-top:16px;margin-bottom:8px;">请选择一个会话</h3>
              <p style="font-size:13px;color:#bbb;">从左侧列表选择消息开始聊天</p>
            </div>
          </div>
        </template>

        <!-- Chat active -->
        <template v-else>
          <!-- Item info mini card -->
          <div class="item-info-card">
            <div class="item-thumb">
              {{ currentItem.name }}
            </div>
            <div class="item-detail">
              <div class="title">{{ currentItem.name }}</div>
              <div class="price">¥{{ currentItem.price }}</div>
              <div class="status">{{ currentItem.status }}</div>
            </div>
            <div class="action-btn">
              <el-button size="small" round>查看商品</el-button>
            </div>
          </div>

          <!-- Chat messages -->
          <div class="chat-messages" ref="messagesContainer">
            <div class="chat-divider">今天</div>

            <div v-for="(msg, idx) in currentMessages" :key="idx">
              <!-- Date divider -->
              <div class="chat-divider" v-if="msg.showDate">{{ msg.dateLabel }}</div>
              <!-- Message row -->
              <div
                class="msg-row"
                :class="msg.isMine ? 'my' : 'their'"
              >
                <div class="msg-avatar" v-if="!msg.isMine">
                  <el-avatar :size="36" :src="activeConversation.avatar">{{ activeConversation.name.charAt(0) }}</el-avatar>
                </div>
                <div class="msg-avatar" v-else>
                  <el-avatar :size="36">我</el-avatar>
                </div>
                <!-- Price offer bubble -->
                <div v-if="msg.type === 'price'" class="bubble price-offer">
                  <div class="offer-label">报价</div>
                  <div class="offer-amount">¥{{ msg.amount }}</div>
                  <div style="font-size:13px;color:#666;">{{ msg.text }}</div>
                  <div class="offer-actions" v-if="msg.showActions">
                    <el-button size="small" type="primary" round style="background:#FFE8D6;border-color:#FFE8D6;color:#333;">接受</el-button>
                    <el-button size="small" round plain>拒绝</el-button>
                    <el-button size="small" round plain>还价</el-button>
                  </div>
                  <span class="msg-time">{{ msg.time }}</span>
                </div>
                <!-- Text bubble -->
                <div v-else class="bubble">
                  {{ msg.text }}
                  <span class="msg-time">{{ msg.time }}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Message input -->
          <div class="chat-input">
            <el-input
              v-model="newMessage"
              placeholder="输入消息..."
              size="default"
              clearable
              @keyup.enter="sendMessage"
              style="flex:1;"
            />
            <button class="send-btn" @click="sendMessage">发送</button>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, nextTick, watch } = Vue;
    // Migration note: Replace mock data with API calls.
    // Conversations fetched from GET /api/messages/conversations
    // Messages fetched from GET /api/messages/:conversationId
    // Post new message via POST /api/messages/:conversationId
    const mockConversations = [
      { id: 1, name: '小李同学', avatar: '', itemId: 101, itemName: '微积分教材', lastMsg: '好的，那就45元成交吧', lastMsgType: 'price', lastTime: '14:32', unread: 2 },
      { id: 2, name: '张学姐', avatar: '', itemId: 102, itemName: '台灯', lastMsg: '没问题，明天下午3点图书馆见', lastMsgType: 'text', lastTime: '昨天', unread: 0 },
      { id: 3, name: '王学长', avatar: '', itemId: 103, itemName: '机械键盘', lastMsg: '还能便宜一点吗？', lastMsgType: 'text', lastTime: '昨天', unread: 1 },
      { id: 4, name: '大二-陈', avatar: '', itemId: 104, itemName: '英语四级真题', lastMsg: '好的，我已经付款了', lastMsgType: 'text', lastTime: '周三', unread: 0 },
      { id: 5, name: '赵同学', avatar: '', itemId: 105, itemName: '瑜伽垫', lastMsg: '还在吗？', lastMsgType: 'text', lastTime: '周一', unread: 3 },
      { id: 6, name: '刘学姐', avatar: '', itemId: 106, itemName: '画板套装', lastMsg: '30元可以吗？', lastMsgType: 'price', lastTime: '2025-06-20', unread: 0 },
    ];

    // Mock items data keyed by itemId
    const mockItems = {
      101: { id: 101, name: '微积分教材', price: 45, status: '在售' },
      102: { id: 102, name: '台灯', price: 20, status: '已售' },
      103: { id: 103, name: '机械键盘', price: 120, status: '在售' },
      104: { id: 104, name: '英语四级真题', price: 25, status: '在售' },
      105: { id: 105, name: '瑜伽垫', price: 35, status: '在售' },
      106: { id: 106, name: '画板套装', price: 50, status: '在售' },
    };

    // Mock messages per conversation (simulating a price negotiation)
    // Migration note: Replace with API response from GET /api/messages/:id
    const mockMessages = {
      1: [
        { type: 'text', text: '你好，请问微积分教材还在吗？', isMine: false, time: '13:45' },
        { type: 'text', text: '在的，昨天刚整理的，基本全新', isMine: true, time: '13:46' },
        { type: 'text', text: '太好了，价格可以便宜一点吗？', isMine: false, time: '13:48' },
        { type: 'price', text: '最低50元可以吗？', amount: 50, isMine: true, time: '13:50', showActions: false },
        { type: 'price', text: '45元行不行？我下午就能来拿', amount: 45, isMine: false, time: '14:02', showActions: true },
        { type: 'text', text: '好吧，那就45元，下午3点图书馆见', isMine: true, time: '14:30' },
        { type: 'text', text: '好的，那就45元成交吧', isMine: false, time: '14:32' },
      ],
      3: [
        { type: 'text', text: '你好，机械键盘还在吗？', isMine: false, time: '15:20' },
        { type: 'text', text: '在的，用了两个月', isMine: true, time: '15:21' },
        { type: 'text', text: '还能便宜一点吗？', isMine: false, time: '15:25' },
      ],
    };

    const app = createApp({
      setup() {
        const searchQuery = ref('');
        const conversations = ref(mockConversations);
        const activeConversation = ref(null);
        const newMessage = ref('');
        const messagesContainer = ref(null);

        const filteredConversations = computed(() => {
          if (!searchQuery.value.trim()) return conversations.value;
          const q = searchQuery.value.trim().toLowerCase();
          return conversations.value.filter(c =>
            c.name.toLowerCase().includes(q) ||
            c.itemName.toLowerCase().includes(q) ||
            c.lastMsg.toLowerCase().includes(q)
          );
        });

        const currentItem = computed(() => {
          if (!activeConversation.value) return {};
          return mockItems[activeConversation.value.itemId] || { name: '未知商品', price: 0, status: '未知' };
        });

        const currentMessages = computed(() => {
          if (!activeConversation.value) return [];
          return mockMessages[activeConversation.value.id] || [];
        });

        function selectConversation(conv) {
          activeConversation.value = conv;
          // Mark as read
          conv.unread = 0;
          // Scroll to bottom after render
          nextTick(() => {
            scrollToBottom();
          });
        }

        function sendMessage() {
          const text = newMessage.value.trim();
          if (!text || !activeConversation.value) return;
          // Migration note: POST /api/messages/:conversationId { text }
          if (!mockMessages[activeConversation.value.id]) {
            mockMessages[activeConversation.value.id] = [];
          }
          mockMessages[activeConversation.value.id].push({
            type: 'text',
            text: text,
            isMine: true,
            time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
          });
          newMessage.value = '';
          // Update last message in conversation list
          activeConversation.value.lastMsg = text;
          activeConversation.value.lastMsgType = 'text';
          activeConversation.value.lastTime = '刚刚';
          nextTick(() => {
            scrollToBottom();
          });
        }

        function scrollToBottom() {
          if (messagesContainer.value) {
            messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
          }
        }

        return {
          searchQuery,
          conversations,
          activeConversation,
          filteredConversations,
          currentItem,
          currentMessages,
          newMessage,
          messagesContainer,
          selectConversation,
          sendMessage,
          Search: ElementPlusIconsVue.Search,
          ChatDotRound: ElementPlusIconsVue.ChatDotRound,
        };
      }
    });

    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
