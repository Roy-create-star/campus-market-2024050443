<!DOCTYPE html>
<!--
  =====================================================
  页面名称: 账号设置
  对应设计稿: 校园轻集市 - 账号设置
  主要功能: 编辑个人资料、修改密码、通知偏好
  迁移说明:
    - el-form 配合 v-model 双向绑定，迁移时对接 API
    - 密码修改区域使用独立 el-form，实际需调用密码修改接口
    - el-switch 通知偏好对接用户通知设置 API
    - 保存按钮颜色使用主色 #FFE8D6
  =====================================================
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账号设置 - 校园轻集市</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.9.1/theme-chalk/index.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --main: #FFE8D6;
      --secondary: #FFF9F3;
      --text-primary: #333;
      --text-secondary: #666;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      color: var(--text-primary);
      background: #f5f5f5;
      margin: 0;
    }
    .container-main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .bg-main { background-color: var(--main); }
    .bg-secondary { background-color: var(--secondary); }
    .text-secondary { color: var(--text-secondary); }
    .settings-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      padding-bottom: 12px;
      border-bottom: 2px solid #FFE8D6;
      margin-bottom: 24px;
    }
    /* 覆盖 Element Plus 默认样式 */
    .el-button--primary {
      --el-button-bg-color: #FFE8D6;
      --el-button-border-color: #FFE8D6;
      --el-button-hover-bg-color: #f5d5b8;
      --el-button-hover-border-color: #f5d5b8;
      --el-button-active-bg-color: #e8c8aa;
      --el-button-active-border-color: #e8c8aa;
      --el-button-text-color: #333;
    }
    .el-button--primary.is-disabled {
      --el-button-disabled-bg-color: #f5e5d8;
      --el-button-disabled-border-color: #f5e5d8;
    }
    .el-switch.is-checked .el-switch__core { border-color: #FFE8D6; background-color: #FFE8D6; }
    .el-input__wrapper.is-focus { box-shadow: 0 0 0 1px #FFE8D6 inset; }
  </style>
</head>
<body>

<div id="app">
  <div class="container-main" style="padding-top: 30px; padding-bottom: 60px;">

    <!-- 顶部导航 -->
    <div class="flex items-center gap-3 mb-6">
      <span style="font-size:22px; cursor:pointer;" @click="goBack">←</span>
      <h1 class="text-xl font-bold">账号设置</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- 左侧：基本资料 + 密码 -->
      <div class="lg:col-span-2 flex flex-col gap-6">

        <!-- ===== 基本资料 ===== -->
        <div class="settings-card">
          <div class="section-title">基本资料</div>
          <el-form :model="profile" label-width="90px" label-position="left">
            <el-form-item label="昵称">
              <el-input v-model="profile.nickname" placeholder="请输入昵称" />
            </el-form-item>
            <el-form-item label="学号">
              <el-input v-model="profile.studentId" placeholder="请输入学号" disabled />
            </el-form-item>
            <el-form-item label="学院">
              <el-select v-model="profile.college" placeholder="请选择学院" style="width:100%;">
                <el-option label="计算机学院" value="计算机学院" />
                <el-option label="外语学院" value="外语学院" />
                <el-option label="数学学院" value="数学学院" />
                <el-option label="信电学院" value="信电学院" />
                <el-option label="机械学院" value="机械学院" />
                <el-option label="建筑学院" value="建筑学院" />
                <el-option label="法学院" value="法学院" />
                <el-option label="体育系" value="体育系" />
              </el-select>
            </el-form-item>
            <el-form-item label="校区">
              <el-select v-model="profile.campus" placeholder="请选择校区" style="width:100%;">
                <el-option label="紫金港校区" value="紫金港校区" />
                <el-option label="玉泉校区" value="玉泉校区" />
                <el-option label="西溪校区" value="西溪校区" />
                <el-option label="华家池校区" value="华家池校区" />
                <el-option label="之江校区" value="之江校区" />
              </el-select>
            </el-form-item>
            <el-form-item label="手机号">
              <el-input v-model="profile.phone" placeholder="请输入手机号" maxlength="11" />
            </el-form-item>
            <el-form-item>
              <el-button type="primary" round @click="saveProfile">保存资料</el-button>
            </el-form-item>
          </el-form>
        </div>

        <!-- ===== 修改密码 ===== -->
        <div class="settings-card">
          <div class="section-title">修改密码</div>
          <el-form :model="passwordForm" label-width="110px" label-position="left">
            <el-form-item label="当前密码">
              <el-input v-model="passwordForm.old" type="password" show-password placeholder="请输入当前密码" />
            </el-form-item>
            <el-form-item label="新密码">
              <el-input v-model="passwordForm.newPwd" type="password" show-password placeholder="请输入新密码" />
            </el-form-item>
            <el-form-item label="确认新密码">
              <el-input v-model="passwordForm.confirm" type="password" show-password placeholder="请再次输入新密码" />
            </el-form-item>
            <el-form-item>
              <el-button type="primary" round @click="changePassword">修改密码</el-button>
            </el-form-item>
          </el-form>
        </div>
      </div>

      <!-- 右侧：通知偏好 -->
      <div class="lg:col-span-1">
        <div class="settings-card">
          <div class="section-title">通知偏好</div>
          <div class="flex flex-col gap-5">
            <div class="flex items-center justify-between">
              <div>
                <div class="text-sm font-medium">私信通知</div>
                <div class="text-secondary text-xs mt-0.5">收到新私信时提醒</div>
              </div>
              <el-switch v-model="notify.message" active-color="#FFE8D6" />
            </div>
            <div class="flex items-center justify-between">
              <div>
                <div class="text-sm font-medium">评论通知</div>
                <div class="text-secondary text-xs mt-0.5">商品收到评论时提醒</div>
              </div>
              <el-switch v-model="notify.comment" active-color="#FFE8D6" />
            </div>
            <div class="flex items-center justify-between">
              <div>
                <div class="text-sm font-medium">状态变更通知</div>
                <div class="text-secondary text-xs mt-0.5">商品状态更新时提醒</div>
              </div>
              <el-switch v-model="notify.status" active-color="#FFE8D6" />
            </div>
            <div class="flex items-center justify-between">
              <div>
                <div class="text-sm font-medium">系统公告</div>
                <div class="text-secondary text-xs mt-0.5">平台公告和活动通知</div>
              </div>
              <el-switch v-model="notify.system" active-color="#FFE8D6" />
            </div>
            <el-button type="primary" round class="mt-4" @click="saveNotify">保存偏好</el-button>
          </div>
        </div>

        <!-- 账号安全提示 -->
        <div
          class="rounded-xl p-4 mt-4"
          style="background:#FFF9F3; border:1px solid #FFE8D6;"
        >
          <div class="flex items-center gap-2 mb-1">
            <span style="font-size:18px;">🔒</span>
            <span class="font-semibold text-sm">账号安全</span>
          </div>
          <div class="text-secondary text-xs leading-relaxed">
            建议定期修改密码，不要使用与其他平台相同的密码。如发现异常登录，请立即修改密码。
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.9.1/index.full.min.js"></script>
<script>
const { createApp, ref, reactive } = Vue;

const app = createApp({
  setup() {
    // ===== 个人资料（迁移时从 API 获取） =====
    const profile = reactive({
      nickname: '张三同学',
      studentId: '20240101001',
      college: '计算机学院',
      campus: '紫金港校区',
      phone: '138****5678',
    });

    // ===== 密码表单（迁移时对接修改密码 API） =====
    const passwordForm = reactive({
      old: '',
      newPwd: '',
      confirm: '',
    });

    // ===== 通知偏好 =====
    const notify = reactive({
      message: true,
      comment: true,
      status: true,
      system: false,
    });

    // ===== 保存资料 =====
    function saveProfile() {
      ElMessage.success('资料保存成功');
    }

    // ===== 修改密码 =====
    function changePassword() {
      if (!passwordForm.old || !passwordForm.newPwd || !passwordForm.confirm) {
        ElMessage.warning('请填写完整密码信息');
        return;
      }
      if (passwordForm.newPwd !== passwordForm.confirm) {
        ElMessage.error('两次输入的新密码不一致');
        return;
      }
      if (passwordForm.newPwd.length < 6) {
        ElMessage.warning('密码长度不能少于6位');
        return;
      }
      ElMessage.success('密码修改成功');
      passwordForm.old = '';
      passwordForm.newPwd = '';
      passwordForm.confirm = '';
    }

    // ===== 保存通知偏好 =====
    function saveNotify() {
      ElMessage.success('通知偏好已保存');
    }

    // ===== 导航 =====
    function goBack() {
      window.location.href = 'profile.html';
    }

    return {
      profile,
      passwordForm,
      notify,
      saveProfile,
      changePassword,
      saveNotify,
      goBack,
    };
  },
});

app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
