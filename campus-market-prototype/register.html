<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 校园轻集市</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 【此处迁移至 Vue3 组件】 -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background: #FFF9F3; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .register-card { background: #fff; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); max-width: 480px; width: 100%; padding: 40px 36px; }
    .brand { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .brand-sub { text-align: center; font-size: 14px; color: #999; margin-bottom: 28px; }
    .submit-btn { width: 100%; background: #FFE8D6 !important; border-color: #FFE8D6 !important; color: #333 !important; font-weight: 600; height: 44px; font-size: 16px; }
    .submit-btn:hover { background: #FFD9B3 !important; border-color: #FFD9B3 !important; }
    .form-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    .form-footer a { color: #333; text-decoration: none; font-weight: 600; }
    .form-footer a:hover { color: #FFD9B3; }
    .error-demo { color: #f56c6c; font-size: 12px; line-height: 1; padding-top: 4px; }
    .step-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0; }
    .step-dot.active { background: #FFE8D6; width: 24px; border-radius: 4px; }
    .agreement { font-size: 12px; color: #999; text-align: center; margin-top: 8px; }
    .agreement a { color: #333; }
  </style>
</head>
<body>
  <div id="app">
    <div class="register-card">
      <div class="brand">🏫 校园轻集市</div>
      <div class="brand-sub">创建你的校园集市账号</div>

      <div class="step-bar">
        <span class="step-dot active"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
      </div>

      <el-form ref="registerFormRef" :model="form" label-position="top" size="large" :rules="rules">
        <el-form-item label="用户名" prop="username">
          <el-input v-model="form.username" placeholder="4-16位字母或数字" prefix-icon="User" />
          <!-- 【此处封装 api.ts】 校验重复 -->
        </el-form-item>

        <el-form-item label="密码" prop="password">
          <el-input v-model="form.password" type="password" placeholder="至少8位，含字母和数字" prefix-icon="Lock" show-password />
        </el-form-item>

        <el-form-item label="确认密码" prop="confirmPassword">
          <el-input v-model="form.confirmPassword" type="password" placeholder="再次输入密码" prefix-icon="Lock" show-password />
        </el-form-item>

        <el-form-item label="学号" prop="studentId">
          <el-input v-model="form.studentId" placeholder="请输入学号" prefix-icon="Reading" />
        </el-form-item>

        <el-form-item label="学院" prop="college">
          <el-select v-model="form.college" placeholder="请选择你的学院" style="width:100%;">
            <el-option label="计算机科学与技术学院" value="cs" />
            <el-option label="电子信息工程学院" value="ee" />
            <el-option label="经济管理学院" value="em" />
            <el-option label="人文社会科学学院" value="hs" />
            <el-option label="外国语学院" value="fl" />
            <el-option label="数学与统计学院" value="ms" />
            <el-option label="艺术与设计学院" value="ad" />
            <el-option label="材料科学与工程学院" value="mse" />
          </el-select>
        </el-form-item>

        <el-form-item>
          <div style="display:flex;gap:4px;flex-direction:column;width:100%;">
            <el-checkbox v-model="form.agree">
              我已阅读并同意 <a href="#" style="color:#333;font-weight:600;">《校园集市用户协议》</a>
            </el-checkbox>
            <!-- 静态错误展示 - 模拟未勾选协议 -->
            <span class="error-demo" v-if="showAgreementError">请阅读并同意用户协议</span>
          </div>
        </el-form-item>

        <el-form-item>
          <el-button type="primary" class="submit-btn" @click="handleRegister" :loading="loading">注 册</el-button>
        </el-form-item>
      </el-form>

      <div class="form-footer">
        已有账号？ <a href="login.html">立即登录 →</a>
      </div>
    </div>
    <!-- 【此处迁移至 Vue3 组件】 【此处写入 pinia 仓库】 -->
  </div>

  <script>
    const { createApp, ref, reactive, computed } = Vue;
    const app = createApp({
      setup() {
        const form = reactive({
          username: '',
          password: '',
          confirmPassword: '',
          studentId: '',
          college: '',
          agree: false
        });
        const loading = ref(false);
        const registerFormRef = ref(null);
        const showAgreementError = ref(true);

        const validateConfirmPassword = (rule, value, callback) => {
          if (value !== form.password) {
            callback(new Error('两次输入密码不一致'));
          } else {
            callback();
          }
        };

        const rules = {
          username: [
            { required: true, message: '请输入用户名', trigger: 'blur' },
            { min: 4, max: 16, message: '长度在 4 到 16 个字符', trigger: 'blur' }
          ],
          password: [
            { required: true, message: '请输入密码', trigger: 'blur' },
            { min: 8, message: '密码至少8位', trigger: 'blur' }
          ],
          confirmPassword: [
            { required: true, message: '请再次输入密码', trigger: 'blur' },
            { validator: validateConfirmPassword, trigger: 'blur' }
          ],
          studentId: [
            { required: true, message: '请输入学号', trigger: 'blur' },
            { pattern: /^\d{8,12}$/, message: '学号格式不正确（8-12位数字）', trigger: 'blur' }
          ],
          college: [
            { required: true, message: '请选择学院', trigger: 'change' }
          ]
        };

        const handleRegister = () => {
          if (!registerFormRef.value) return;
          registerFormRef.value.validate((valid) => {
            if (valid && form.agree) {
              loading.value = true;
              showAgreementError.value = false;
              setTimeout(() => {
                loading.value = false;
                ElementPlus.ElMessage.success('注册成功（静态演示）');
              }, 1200);
            } else {
              if (!form.agree) {
                showAgreementError.value = true;
              }
              ElementPlus.ElMessage.warning('请完善注册信息');
            }
          });
        };

        return { form, loading, registerFormRef, rules, handleRegister, showAgreementError };
      }
    });
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
