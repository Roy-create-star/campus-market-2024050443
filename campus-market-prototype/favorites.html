<!DOCTYPE html>
<!--
  =====================================================
  页面名称: 我的收藏 (子页面)
  对应设计稿: 校园轻集市 - 我的收藏
  主要功能: 收藏商品网格展示、取消收藏
  迁移说明:
    - 网格布局与分类页卡片风格一致
    - 心形图标填充 #FFE8D6 表示收藏状态
    - 点击心形取消收藏，迁移时对接 API 移除
    - 图片占位 div 替换为真实 <img>
  =====================================================
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的收藏 - 校园轻集市</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.9.1/theme-chalk/index.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --main: #FFE8D6;
      --secondary: #FFF9F3;
      --text-primary: #333;
      --text-secondary: #666;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      color: var(--text-primary);
      background: #f5f5f5;
      margin: 0;
    }
    .container-main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .bg-main { background-color: var(--main); }
    .text-secondary { color: var(--text-secondary); }
    .fav-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 0.2s;
      position: relative;
    }
    .fav-card:hover { transform: translateY(-3px); }
    .fav-img {
      width: 100%;
      padding-top: 75%;
      background: #e0e0e0;
      position: relative;
    }
    .heart-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 22px;
      cursor: pointer;
      color: #FFE8D6;
      text-shadow: 0 0 6px rgba(0,0,0,0.15);
      transition: transform 0.2s;
      user-select: none;
      line-height: 1;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .heart-btn:hover { transform: scale(1.15); }
  </style>
</head>
<body>

<div id="app">
  <div class="container-main" style="padding-top: 30px; padding-bottom: 60px;">
    <!-- 顶部导航 -->
    <div class="flex items-center gap-3 mb-6">
      <span style="font-size:22px; cursor:pointer;" @click="goBack">←</span>
      <h1 class="text-xl font-bold">我的收藏</h1>
      <span class="text-secondary text-sm">共 {{ favorites.length }} 件</span>
    </div>

    <!-- 收藏网格 -->
    <div v-if="favorites.length" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
      <div class="fav-card" v-for="(item, idx) in favorites" :key="idx">
        <div class="fav-img">
          <div class="heart-btn" @click="removeFavorite(idx)" title="取消收藏">❤️</div>
        </div>
        <div class="p-3">
          <div class="font-semibold text-sm truncate">{{ item.title }}</div>
          <div class="flex items-center justify-between mt-1">
            <span style="color:#333; font-weight:600; font-size:15px;">¥{{ item.price }}</span>
            <span class="text-secondary text-xs">{{ item.college }}</span>
          </div>
          <div class="text-secondary text-xs mt-1 truncate">{{ item.date }}</div>
        </div>
      </div>
    </div>

    <el-empty v-else description="收藏列表为空" :image-size="80" style="margin-top:80px;" />

    <!-- 提示 -->
    <div
      class="flex items-center gap-2 mt-8 p-4 rounded-xl"
      style="background:#FFF9F3; color:#666; font-size:13px;"
    >
      <span>💡</span>
      <span>点击 ❤️ 可取消收藏，商品下架后会自动从收藏中移除</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/element-plus/2.9.1/index.full.min.js"></script>
<script>
const { createApp, ref, reactive } = Vue;

const app = createApp({
  setup() {
    // ===== 收藏数据（迁移时替换为 API 数据） =====
    const favorites = reactive([
      { title: '机械键盘 青轴 87键', price: 89, college: '计算机学院', date: '2026-06-22' },
      { title: '英语六级真题 2026版', price: 20, college: '外语学院', date: '2026-06-20' },
      { title: '瑜伽垫 加厚10mm', price: 35, college: '体育系', date: '2026-06-19' },
      { title: 'LED 护眼台灯 三档调光', price: 45, college: '计算机学院', date: '2026-06-18' },
      { title: '移动电源 20000mAh 快充', price: 60, college: '信电学院', date: '2026-06-17' },
      { title: '画板 4K 美术生专用', price: 30, college: '建筑学院', date: '2026-06-15' },
      { title: '微积分辅导书 含习题', price: 18, college: '数学学院', date: '2026-06-14' },
      { title: '宿舍吊椅 免打孔', price: 70, college: '机械学院', date: '2026-06-12' },
      { title: '羽毛球拍 一对', price: 55, college: '体育系', date: '2026-06-10' },
      { title: '考研政治 徐涛核心', price: 25, college: '法学院', date: '2026-06-08' },
    ]);

    // ===== 取消收藏 =====
    function removeFavorite(idx) {
      const item = favorites[idx];
      favorites.splice(idx, 1);
      ElMessage.success('已取消收藏：「' + item.title + '」');
    }

    // ===== 导航 =====
    function goBack() {
      window.location.href = 'profile.html';
    }

    return {
      favorites,
      removeFavorite,
      goBack,
    };
  },
});

app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
